<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ingresar - Business Management</title>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CUSTOM -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="page-body">

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner container">
      <div class="logo-wrap">
        <img src="img/buisness.png" alt="Business Management" class="logo-img">
      </div>
      <div class="title-wrap">
        <h1 class="site-title">BUSINESS<br>MANAGEMENT</h1>
      </div>
    </div>

    <p class="welcome-text text-center">Hola Visitante</p>

    <nav class="navbar navbar-expand-lg navbar-light bg-light nav-strip">
      <div class="container-fluid">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 nav-list">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="register.html">Registrarse</a></li>
          <li class="nav-item"><a class="nav-link active" href="login.html">Ingresar</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="container py-4">
    <h2 class="form-title text-center">Formulario de Ingreso</h2>

    <form id="loginForm" class="mx-auto" style="max-width:800px;">
      <div class="mb-3">
        <label class="form-label">Correo:</label>
        <input type="email" id="l-email" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña:</label>
        <input type="password" id="l-pass" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Elige tu rol:</label>
        <select id="l-role" class="form-select">
          <option value="administrador">Administrador</option>
          <option value="gerente">Gerente</option>
          <option value="asistente">Asistente</option>
        </select>
      </div>

      <div class="d-grid">
        <button class="btn btn-primary btn-register" type="submit">Ingresar</button>
      </div>
    </form>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer text-center">
    <div class="container py-4">
      <p class="mb-2">© Businnes Management</p>
      <div class="footer-links">
        <a href="#">Contacto</a>
        <a href="#">Terminos de uso</a>
        <a href="#">Soporte</a>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>

</html>
