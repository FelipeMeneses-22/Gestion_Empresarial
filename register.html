<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registro - Business Management</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-body">

<header class="site-header">
  <div class="header-inner container">
    <div class="logo-wrap">
      <img src="img/buisness.png" class="logo-img">
    </div>
    <h1 class="site-title">BUSINESS<br>MANAGEMENT</h1>
  </div>
</header>

<main class="container py-4">
  <h2 class="form-title text-center">Registro de Usuario</h2>

  <form id="registerForm" class="mx-auto" style="max-width:800px;">
    <div class="mb-3">
      <label class="form-label">Nombre:</label>
      <input type="text" id="r-name" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Correo:</label>
      <input type="email" id="r-email" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Contraseña:</label>
      <input type="password" id="r-pass" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Rol:</label>
      <select id="r-role" class="form-select">
        <option value="administrador">Administrador</option>
        <option value="gerente">Gerente</option>
        <option value="asistente">Asistente</option>
      </select>
    </div>

    <div class="d-grid">
      <button class="btn btn-primary" type="submit">Registrar</button>
    </div>
  </form>
</main>

<footer class="site-footer text-center">
  <p>© Business Management</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
